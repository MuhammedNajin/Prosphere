apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: company
  template:
    metadata:
      labels:
        app: company
    spec:
      containers:
        - name: company
          image: najinn675943/prosphere_company_service
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URL

            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: NODE_ENV

            - name: MESSAGE_BROKERS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MESSAGE_BROKERS

            - name: COMPANY_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_ACCESS_SECRET

            - name: BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_BUCKET_NAME

            - name: BUCKET_REGION
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_BUCKET_REGION

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_SECRET_KEY

            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_ACCESS_KEY

            - name: PROD_FRONTEND_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PROD_FRONTEND_DOMAIN

            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_PORT

            - name: ADMIN_SECRECT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_SECRECT

            - name: JWT_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_JWT_ACCESS_TOKEN_SECRET

            - name: JWT_ACCESS_TOKEN_EXPIRY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_JWT_ACCESS_TOKEN_EXPIRY

            - name: COMPANY_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_TOKEN_SECRET

            - name: COMPANY_TOKEN_EXPIRY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_TOKEN_EXPIRY

            - name: SERVICE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_SERVICE_NAME

          ports:
            - containerPort: 3004

---
apiVersion: v1
kind: Service
metadata:
  name: company-srv
spec:
  type: ClusterIP
  selector:
    app: company
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004