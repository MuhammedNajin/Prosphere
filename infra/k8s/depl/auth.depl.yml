apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: najinn675943/prosphere_auth_service:v1.0.5
          env:
            # Database and External Service Configuration
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URL

            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_URL

            - name: MESSAGE_BROKERS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MESSAGE_BROKERS

            # Email Service Configuration
            - name: SENDER_MAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SENDER_MAIL

            - name: PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PASS

            # JWT Token Configuration
            - name: JWT_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_ACCESS_TOKEN_SECRET

            - name: JWT_REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_REFRESH_TOKEN_SECRET

            - name: JWT_ACCESS_TOKEN_EXPIRY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_ACCESS_TOKEN_EXPIRY

            - name: JWT_REFRESH_TOKEN_EXPIRY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_REFRESH_TOKEN_EXPIRY

            # Service Identity Configuration
            - name: SERVICE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH_SERVICE_NAME

            # Application URLs and Domains
            - name: URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: URL

            - name: PROD_FRONTEND_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PROD_FRONTEND_DOMAIN

            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: FRONTEND_URL

            # Company Configuration
            - name: COMPANY_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_NAME

            - name: COMPANY_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_DOMAIN

            # Admin Account Configuration
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_EMAIL

            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_PASS

            - name: ADMIN_SECRECT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_SECRECT

            - name: ADMIN_REFRESH_SECRECT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_REFRESH_SECRECT

            # Service Port Configuration
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH_PORT

            # OAuth Configuration
            - name: AUTH_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_CLIENT_ID

            # Environment Configuration
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: NODE_ENV

            # SMTP Config
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_HOST

            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PORT

          ports:
            - containerPort: 3002

---
apiVersion: v1
kind: Service
metadata:
  name: auth-srv
spec:
  type: ClusterIP
  selector:
    app: auth
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
