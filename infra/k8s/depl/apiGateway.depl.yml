apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: najinn675943/prosphere_api_gateway_service
          env:
            - name: COMPANY_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COMPANY_ACCESS_SECRET

            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APIGATEWAY_PORT

            - name: authService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: authService

            - name: userService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: userService

            - name: jobService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jobService

            - name: companyService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: companyService

            - name: chatService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: chatService

            - name: paymentService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: paymentService

            - name: notificationService
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: notificationService

            - name: PROD_FRONTEND_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PROD_FRONTEND_DOMAIN

            - name: JWT_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_ACCESS_TOKEN_SECRET
          ports:
            - containerPort: 6002

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-srv
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 6002
      targetPort: 6002
